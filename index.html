<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cluj Facility — Asset Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --navy:#1C2530; --navy-2:#243040; --paper:#F6F4EF; --paper-2:#FFFFFF;
    --ink:#20262C; --ink-soft:#5B6570; --ink-faint:#8B8F94;
    --line:#DEDACF; --line-strong:#C7C2B5;
    --amber:#C97F1E; --amber-bg:#FBEEDA; --amber-line:#E8C286;
    --steel:#33536C; --steel-bg:#E8EEF2;
    --green:#3F7A55; --green-bg:#E4F0E7; --green-line:#B7D6C1;
    --red:#AE4636; --red-bg:#F7E4E0; --red-line:#E3B4A8;
    --gray:#75797D; --gray-bg:#ECEAE5;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans); background:var(--paper); color:var(--ink); font-size:14px; line-height:1.5;}
  button, input, select, textarea{font-family:inherit; font-size:14px;}
  h1,h2,h3,h4{margin:0; font-weight:600; color:var(--ink);}
  p{margin:0;}
  a{color:var(--steel);}

  #storage-banner{background:var(--amber-bg); color:var(--amber); border-bottom:1px solid var(--amber-line); padding:8px 16px; font-size:12.5px; text-align:center; display:none;}

  .shell{display:flex; min-height:100vh;}
  .sidebar{width:216px; flex-shrink:0; background:var(--navy); color:#EDEAE2; display:flex; flex-direction:column; padding:18px 0;}
  .brand{padding:0 18px 18px; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:10px;}
  .brand .mark{font-family:var(--mono); font-size:11px; letter-spacing:.12em; color:var(--amber); text-transform:uppercase;}
  .brand .title{font-size:15.5px; font-weight:600; color:#fff; margin-top:2px;}
  .nav-item{display:flex; align-items:center; gap:10px; padding:10px 18px; color:#C7CBD1; cursor:pointer; border-left:3px solid transparent; font-size:13.5px;}
  .nav-item:hover{background:rgba(255,255,255,0.05); color:#fff;}
  .nav-item.active{background:rgba(255,255,255,0.07); color:#fff; border-left-color:var(--amber);}
  .nav-icon{width:16px; text-align:center; font-family:var(--mono); font-size:12px; opacity:.8;}
  .nav-spacer{flex:1;}
  .role-tag{margin:10px 18px 0; font-size:11px; color:var(--ink-faint); background:rgba(255,255,255,0.06); padding:6px 10px; border-radius:6px; color:#AEB3B9;}

  .main{flex:1; display:flex; flex-direction:column; min-width:0;}
  .topbar{height:56px; flex-shrink:0; background:var(--paper-2); border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; padding:0 20px;}
  .topbar .view-title{font-size:16px; font-weight:600;}
  .topbar .role-switch{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-soft);}
  .content{padding:22px; flex:1; overflow-y:auto;}

  .field{width:100%; padding:8px 10px; border:1px solid var(--line-strong); border-radius:6px; background:#fff; color:var(--ink);}
  .field:focus{outline:2px solid var(--steel); outline-offset:1px;}
  label.flabel{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:4px; font-weight:600;}
  .form-row{margin-bottom:14px;}
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}

  .btn{display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:6px; border:1px solid var(--line-strong); background:#fff; color:var(--ink); cursor:pointer; font-size:13.5px; font-weight:500;}
  .btn:hover{border-color:var(--ink-soft);}
  .btn-primary{background:var(--navy); border-color:var(--navy); color:#fff;}
  .btn-primary:hover{background:var(--navy-2);}
  .btn-amber{background:var(--amber); border-color:var(--amber); color:#fff;}
  .btn-danger{background:#fff; border-color:var(--red); color:var(--red);}
  .btn-sm{padding:5px 10px; font-size:12.5px;}
  .btn[disabled]{opacity:.5; cursor:not-allowed;}

  .card{background:var(--paper-2); border:1px solid var(--line); border-radius:12px; padding:16px 18px;}
  .metric-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:20px;}
  .metric{background:var(--paper-2); border:1px solid var(--line); border-radius:10px; padding:14px 16px;}
  .metric .num{font-size:26px; font-weight:600; font-family:var(--mono);}
  .metric .lbl{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  .grid-assets{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px;}
  .asset-tag{position:relative; background:var(--paper-2); border:1px solid var(--line); border-left:6px solid var(--tag-color,var(--gray)); border-radius:8px; padding:12px 14px; cursor:pointer; display:flex; flex-direction:column; gap:6px;}
  .asset-tag:hover{border-color:var(--steel); box-shadow:0 0 0 1px var(--steel) inset;}
  .asset-tag .eyebrow{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); display:flex; justify-content:space-between;}
  .asset-tag .num{font-family:var(--mono); font-size:16.5px; font-weight:600;}
  .asset-tag .meta{font-size:12px; color:var(--ink-soft);}
  .asset-tag .rowline{display:flex; justify-content:space-between; align-items:center; margin-top:2px;}

  .pill{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:20px; white-space:nowrap;}
  .pill-operational{background:var(--green-bg); color:var(--green); border:1px solid var(--green-line);}
  .pill-requires_intervention{background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-line);}
  .pill-failure{background:var(--red-bg); color:var(--red); border:1px solid var(--red-line);}
  .pill-decommissioned{background:var(--gray-bg); color:var(--gray); border:1px solid var(--line-strong);}
  .chip{font-size:11px; font-weight:600; padding:2px 8px; border-radius:5px;}
  .chip-low{background:var(--gray-bg); color:var(--gray);}
  .chip-medium{background:var(--steel-bg); color:var(--steel);}
  .chip-critical{background:var(--red-bg); color:var(--red);}

  table.table{width:100%; border-collapse:collapse; font-size:13px;}
  table.table th{text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); border-bottom:1px solid var(--line-strong); padding:8px 10px;}
  table.table td{padding:9px 10px; border-bottom:1px solid var(--line);}
  table.table tr:hover td{background:#FBFAF7;}

  .toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px;}
  .toolbar .field{width:auto; min-width:150px;}
  .search-field{flex:1; min-width:180px;}

  .modal-backdrop{position:fixed; inset:0; background:rgba(20,24,28,0.5); display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; z-index:100; overflow-y:auto;}
  .modal{background:#fff; border-radius:12px; width:100%; max-width:560px; padding:20px 22px; box-shadow:0 12px 40px rgba(0,0,0,0.25);}
  .modal h3{margin-bottom:4px;}
  .modal .sub{color:var(--ink-soft); font-size:12.5px; margin-bottom:16px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:18px; border-top:1px solid var(--line); padding-top:14px;}

  .toast-wrap{position:fixed; top:16px; right:16px; z-index:200; display:flex; flex-direction:column; gap:8px;}
  .toast{background:var(--navy); color:#fff; padding:10px 16px; border-radius:8px; font-size:13px; box-shadow:0 6px 18px rgba(0,0,0,0.2);}

  .checklist-item{display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--line); font-size:13px;}
  .checklist-item:last-child{border-bottom:none;}

  .timeline-item{border-left:2px solid var(--line-strong); padding:2px 0 14px 16px; position:relative; margin-left:4px;}
  .timeline-item::before{content:""; position:absolute; left:-5px; top:2px; width:8px; height:8px; border-radius:50%; background:var(--steel);}
  .timeline-item .t-head{font-size:13px; font-weight:600;}
  .timeline-item .t-meta{font-size:11.5px; color:var(--ink-soft); margin-top:1px;}
  .timeline-item .t-body{font-size:12.5px; color:var(--ink-soft); margin-top:4px;}

  .empty-state{text-align:center; padding:50px 20px; color:var(--ink-soft);}
  .empty-state h3{margin-bottom:6px; color:var(--ink);}

  .visitor-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy); padding:24px;}
  .visitor-card{background:#fff; border-radius:14px; padding:28px 26px; width:100%; max-width:420px;}

  .qr-box{background:#fff; padding:10px; border:1px solid var(--line); border-radius:8px; display:inline-block;}

  @media (max-width:780px){
    .shell{flex-direction:column;}
    .sidebar{width:100%; flex-direction:row; padding:0; position:fixed; bottom:0; left:0; right:0; z-index:50; overflow-x:auto; border-top:1px solid rgba(255,255,255,0.1);}
    .brand{display:none;}
    .nav-item{flex-direction:column; gap:2px; padding:8px 12px; border-left:none; border-top:3px solid transparent; font-size:10.5px; white-space:nowrap;}
    .nav-item.active{border-left-color:transparent; border-top-color:var(--amber);}
    .role-tag{display:none;}
    .nav-spacer{display:none;}
    .main{padding-bottom:58px;}
    .form-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div id="storage-banner">Running without persistent saving — this preview mode won't keep data between sessions. Open inside Claude to enable saving.</div>
<div id="app"></div>
<div class="toast-wrap" id="toast-wrap"></div>

<script>
/* ============================= CONSTANTS ============================= */
const STATUS_DEF = {
  operational: {label:'Operational', color:'green'},
  requires_intervention: {label:'Requires intervention', color:'amber'},
  failure: {label:'Failure', color:'red'},
  decommissioned: {label:'Decommissioned', color:'gray'}
};
const PRIORITY_DEF = {
  low:{label:'Low'}, medium:{label:'Medium'}, critical:{label:'Critical'}
};
const ACTION_LABEL = {check:'Check', pm:'Preventive maintenance', intervention:'Intervention'};

const DEFAULT_TYPES = [
  {id:'electrical-socket', name:'Electrical Socket',
    check:['No visible scorch marks or discoloration','Cover plate intact and secure','Socket tests live with a device','Grounding pin present and secure'],
    pm:['Tightened terminal screws','Cleaned contacts','Insulation resistance tested','Cover plate replaced if damaged']},
  {id:'adjustable-desk', name:'Adjustable Desk',
    check:['Height adjustment operates smoothly','No unusual noise when raising/lowering','Stable at all heights','Cables and cable tray intact'],
    pm:['Lubricated moving mechanism','Checked and tightened frame bolts','Tested full range of motion','Weight capacity sticker legible']},
  {id:'regular-desk', name:'Regular Desk',
    check:['No structural damage or wobbling','Surface free of major damage','Edge banding intact'],
    pm:['Tightened all fasteners','Touched up surface finish if needed']},
  {id:'ergonomic-chair', name:'Ergonomic Chair',
    check:['Gas lift raises/lowers smoothly','Armrests adjust and lock properly','Casters roll freely','Backrest tilt mechanism functions','No tears in upholstery'],
    pm:['Lubricated gas lift and tilt mechanism','Tightened all bolts','Worn casters replaced','Upholstery cleaned']},
  {id:'ups', name:'UPS',
    check:['Battery status indicator normal','No error codes on display','Load level within safe range','Vents unobstructed'],
    pm:['Battery voltage tested','Firmware/settings verified','Vents cleaned','Self-test / load test run']},
  {id:'diesel-generator', name:'Diesel Generator',
    check:['Fuel level adequate','No visible leaks','Battery charge indicator normal','Control panel free of fault codes'],
    pm:['Oil and filter changed','Coolant level checked','Battery tested / replaced if needed','Test run under load performed','Air filter inspected / replaced']},
  {id:'cooling-equipment', name:'Cooling Equipment',
    check:['Airflow normal at vents','No unusual noise or vibration','Thermostat reading within range','No visible leaks'],
    pm:['Filters cleaned / replaced','Coils cleaned','Refrigerant level checked','Condensate drain cleared','Electrical connections inspected']}
];

const ROLE_NAV = {
  admin:['dashboard','assets','log-action','scan','pm','reports','settings'],
  user:['dashboard','assets','log-action','scan','pm','reports'],
  vendor:['scan','log-action','reports'],
  visitor:[]
};
const NAV_META = {
  dashboard:{label:'Dashboard', icon:'DB'},
  assets:{label:'Assets', icon:'AS'},
  'log-action':{label:'Log action', icon:'LA'},
  scan:{label:'Scan / lookup', icon:'SC'},
  pm:{label:'PM schedule', icon:'PM'},
  reports:{label:'Reports', icon:'RP'},
  settings:{label:'Settings', icon:'ST'}
};

/* ============================= STATE ============================= */
let STATE = {
  role:'admin',
  route:'dashboard',
  assets:[],
  actions:[],
  types:[],
  pmSchedules:[],
  storageOk:true,
  loaded:false,
  selectedAsset:null,
  logPrefill:null
};
function getState(){ return STATE; }

/* ============================= STORAGE HELPERS ============================= */
async function safeGet(key){
  try{
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function safeSet(key, value){
  try{
    await window.storage.set(key, JSON.stringify(value), true);
    return true;
  }catch(e){ console.error('storage set failed for', key, e); return false; }
}
async function safeDelete(key){
  try{ await window.storage.delete(key, true); return true; }catch(e){ return false; }
}

function escapeHtml(str){
  if(str===undefined || str===null) return '';
  return String(str).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function fmtDate(d){
  if(!d) return '—';
  try{ const dt = new Date(d); if(isNaN(dt)) return d; return dt.toISOString().slice(0,10); }catch(e){ return d; }
}
function fmtDateTime(d){
  try{ const dt = new Date(d); return dt.toLocaleString(); }catch(e){ return d; }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function toast(msg){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3200);
}
function typeName(typeId){
  const t = STATE.types.find(t=>t.id===typeId);
  return t ? t.name : typeId;
}
function getAsset(assetNumber){
  return STATE.assets.find(a=>a.assetNumber===assetNumber);
}
function assetsOfType(typeId){
  return STATE.assets.filter(a=>a.typeId===typeId);
}
function actionsForAsset(assetNumber){
  return STATE.actions.filter(a=>a.assetNumbers.includes(assetNumber))
    .sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));
}
function lastActionOfType(assetNumber, actionType){
  const list = actionsForAsset(assetNumber).filter(a=>a.type===actionType);
  return list.length ? list[0] : null;
}

/* ============================= INIT ============================= */
async function init(){
  STATE.storageOk = (typeof window.storage !== 'undefined');
  if(!STATE.storageOk){ document.getElementById('storage-banner').style.display='block'; }

  const [assets, actions, types, pm] = await Promise.all([
    safeGet('assets'), safeGet('actions'), safeGet('asset-types'), safeGet('pm-schedules')
  ]);
  STATE.assets = assets || [];
  STATE.actions = actions || [];
  STATE.pmSchedules = pm || [];
  if(types && types.length){
    STATE.types = types;
  }else{
    STATE.types = DEFAULT_TYPES;
    await safeSet('asset-types', STATE.types);
  }
  STATE.loaded = true;
  render();
}

/* ============================= NAVIGATION ============================= */
function navigate(route, opts){
  STATE.route = route;
  STATE.selectedAsset = (opts && opts.assetNumber) || null;
  STATE.logPrefill = (opts && opts.logPrefill) || null;
  render();
}
function setRole(role){
  STATE.role = role;
  const allowed = ROLE_NAV[role];
  if(allowed.length && !allowed.includes(STATE.route)){
    STATE.route = allowed[0];
  }
  render();
}

/* ============================= RENDER SHELL ============================= */
function render(){
  const app = document.getElementById('app');
  if(!STATE.loaded){
    app.innerHTML = '<div style="padding:40px;color:var(--ink-soft)">Loading…</div>';
    return;
  }
  if(STATE.role === 'visitor'){
    app.innerHTML = renderVisitor();
    attachVisitorEvents();
    return;
  }
  const nav = ROLE_NAV[STATE.role];
  app.innerHTML = `
    <div class="shell">
      <div class="sidebar">
        <div class="brand">
          <div class="mark">Cluj Facility</div>
          <div class="title">Asset Manager</div>
        </div>
        ${nav.map(r=>`
          <div class="nav-item ${STATE.route===r?'active':''}" onclick="navigate('${r}')">
            <span class="nav-icon">${NAV_META[r].icon}</span><span>${NAV_META[r].label}</span>
          </div>`).join('')}
        <div class="nav-spacer"></div>
        <div class="role-tag">Signed in as ${STATE.role}</div>
      </div>
      <div class="main">
        <div class="topbar">
          <div class="view-title">${currentViewTitle()}</div>
          <div class="role-switch">
            Viewing as
            <select class="field" style="width:auto;padding:5px 8px" onchange="setRole(this.value)">
              <option value="admin" ${STATE.role==='admin'?'selected':''}>Admin</option>
              <option value="user" ${STATE.role==='user'?'selected':''}>Team user</option>
              <option value="vendor" ${STATE.role==='vendor'?'selected':''}>Vendor / handyman</option>
              <option value="visitor" ${STATE.role==='visitor'?'selected':''}>Visitor (public scan)</option>
            </select>
          </div>
        </div>
        <div class="content" id="content"></div>
      </div>
    </div>`;
  const content = document.getElementById('content');
  if(STATE.route==='dashboard') content.innerHTML = renderDashboard();
  else if(STATE.route==='assets') content.innerHTML = renderAssets();
  else if(STATE.route==='asset-profile') content.innerHTML = assetProfileHtml(STATE.selectedAsset);
  else if(STATE.route==='log-action') content.innerHTML = renderLogAction();
  else if(STATE.route==='scan') content.innerHTML = renderScan();
  else if(STATE.route==='pm') content.innerHTML = renderPM();
  else if(STATE.route==='reports') content.innerHTML = renderReports();
  else if(STATE.route==='settings') content.innerHTML = renderSettings();
  attachRouteEvents();
}
function currentViewTitle(){
  if(STATE.route==='asset-profile') return 'Asset profile';
  return NAV_META[STATE.route] ? NAV_META[STATE.route].label : '';
}

/* ============================= DASHBOARD ============================= */
function renderDashboard(){
  const counts = {operational:0, requires_intervention:0, failure:0, decommissioned:0};
  STATE.assets.forEach(a=> counts[a.status] = (counts[a.status]||0)+1 );
  const critical = STATE.assets.filter(a=>a.priority==='critical' && a.status!=='decommissioned');
  const overdue = critical.filter(a=> pmStatusFor(a.assetNumber).overdue );
  const recent = STATE.actions.slice().sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,8);

  return `
    <div class="metric-grid">
      <div class="metric"><div class="num">${STATE.assets.length}</div><div class="lbl">Total assets</div></div>
      <div class="metric"><div class="num" style="color:var(--green)">${counts.operational}</div><div class="lbl">Operational</div></div>
      <div class="metric"><div class="num" style="color:var(--amber)">${counts.requires_intervention}</div><div class="lbl">Requires intervention</div></div>
      <div class="metric"><div class="num" style="color:var(--red)">${counts.failure}</div><div class="lbl">Failure</div></div>
      <div class="metric"><div class="num" style="color:var(--red)">${overdue.length}</div><div class="lbl">Overdue PM (critical)</div></div>
    </div>
    ${overdue.length ? `
    <h3 style="margin-bottom:10px;">Overdue preventive maintenance — critical assets</h3>
    <div class="card" style="margin-bottom:22px;">
      ${overdue.map(a=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)">
          <div><span style="font-family:var(--mono);font-weight:600">${escapeHtml(a.assetNumber)}</span> — ${escapeHtml(typeName(a.typeId))}</div>
          <button class="btn btn-sm" onclick="viewAssetProfile('${escapeHtml(a.assetNumber)}')">View</button>
        </div>`).join('')}
    </div>` : '' }
    <h3 style="margin-bottom:10px;">Recent activity</h3>
    <div class="card">
      ${recent.length ? recent.map(a=>`
        <div class="timeline-item">
          <div class="t-head">${ACTION_LABEL[a.type]} — ${a.scope==='bulk' ? escapeHtml(typeName(a.typeId))+' (all assets)' : escapeHtml(a.assetNumbers.join(', '))}</div>
          <div class="t-meta">${fmtDateTime(a.timestamp)} · logged by ${escapeHtml(a.loggedBy||'—')}</div>
        </div>`).join('') : '<div class="empty-state">No actions logged yet.</div>'}
    </div>
  `;
}
function pmStatusFor(assetNumber){
  const sched = STATE.pmSchedules.find(s=>s.assetNumber===assetNumber);
  if(!sched || !sched.intervalDays) return {set:false, overdue:false};
  const lastPM = lastActionOfType(assetNumber,'pm');
  const asset = STATE.assets.find(a=>a.assetNumber===assetNumber);
  const baseline = lastPM ? lastPM.timestamp : (asset ? asset.purchaseDate : null);
  if(!baseline) return {set:true, overdue:false, noBaseline:true, intervalDays:sched.intervalDays};
  const next = new Date(baseline); next.setDate(next.getDate()+Number(sched.intervalDays));
  return {set:true, overdue: next < new Date(), nextDue: next, intervalDays:sched.intervalDays};
}

/* ============================= ASSETS LIST ============================= */
function renderAssets(){
  return `
    <div class="toolbar">
      <input class="field search-field" id="asset-search" placeholder="Search asset number, ID or type…" oninput="filterAssetGrid()">
      <select class="field" id="filter-type" onchange="filterAssetGrid()">
        <option value="">All types</option>
        ${STATE.types.map(t=>`<option value="${t.id}">${escapeHtml(t.name)}</option>`).join('')}
      </select>
      <select class="field" id="filter-status" onchange="filterAssetGrid()">
        <option value="">All statuses</option>
        ${Object.keys(STATUS_DEF).map(s=>`<option value="${s}">${STATUS_DEF[s].label}</option>`).join('')}
      </select>
      <div style="flex:1"></div>

function assetGridHtml(list){
  if(!list.length) return `<div class="empty-state" style="grid-column:1/-1"><h3>No assets yet</h3><p>Add one manually or import your Excel file.</p></div>`;
  return list.map(a=>{
    const st = STATUS_DEF[a.status] || STATUS_DEF.operational;
    return `
    <div class="asset-tag" style="--tag-color:var(--${st.color})" onclick="viewAssetProfile('${escapeHtml(a.assetNumber)}')">
      <div class="eyebrow"><span>${escapeHtml(typeName(a.typeId))}</span><span class="chip chip-${a.priority}">${PRIORITY_DEF[a.priority].label}</span></div>
      <div class="num">${escapeHtml(a.assetNumber)}</div>
      <div class="meta">${a.assetId ? 'Mfr ID: '+escapeHtml(a.assetId) : 'No manufacturer ID'}</div>
      <div class="rowline"><span class="pill pill-${a.status}">${st.label}</span></div>
    </div>`;
  }).join('');
}
function getFilteredAssets(){
  const searchEl = document.getElementById('asset-search');
  if(!searchEl) return STATE.assets;
  const q = (searchEl.value||'').toLowerCase();
  const t = document.getElementById('filter-type').value;
  const s = document.getElementById('filter-status').value;
  return STATE.assets.filter(a=>{
    if(t && a.typeId!==t) return false;
    if(s && a.status!==s) return false;
    if(q && !(a.assetNumber.toLowerCase().includes(q) || (a.assetId||'').toLowerCase().includes(q) || typeName(a.typeId).toLowerCase().includes(q))) return false;
    return true;
  });
}
function filterAssetGrid(){
  document.getElementById('asset-grid').innerHTML = assetGridHtml(getFilteredAssets());
}

function saveAssetFromModal(editingNumber){
  const num = document.getElementById('m-num').value.trim();
  const id = document.getElementById('m-id').value.trim();
  const typeId = document.getElementById('m-type').value;
  const priority = document.getElementById('m-priority').value;
  const date = document.getElementById('m-date').value;
  const price = document.getElementById('m-price').value;
  if(!num){ toast('Asset Number is required'); return; }
  if(!editingNumber && STATE.assets.some(a=>a.assetNumber===num)){ toast('That Asset Number already exists'); return; }

    const a = STATE.assets.find(a=>a.assetNumber===editingNumber);
    a.assetId=id; a.typeId=typeId; a.priority=priority; a.purchaseDate=date; a.price=price?parseFloat(price):undefined;

  safeSet('assets', STATE.assets);
  closeModal(); toast('Asset saved');

}

function submitStatusChange(assetNumber){
  const newStatus = document.getElementById('cs-status').value;
  const descEl = document.getElementById('cs-desc');

    toast("Add a description of what's wrong");

  }
  const a = getAsset(assetNumber);

  a.status = newStatus;
  const action = {
    id:uid(), type:'intervention', scope:'single', assetNumbers:[assetNumber],
    resultingStatus:newStatus,
    description: (newStatus==='requires_intervention'||newStatus==='failure') ? text : undefined,

  };

function renderLogActionFields(){
  const scope = document.getElementById('la-scope').value;
  const el = document.getElementById('la-scope-fields');

    const preAsset = pre && pre.assetNumber ? getAsset(pre.assetNumber) : null;
    const preType = preAsset ? preAsset.typeId : '';
    el.innerHTML = `

        <select class="field" id="la-type-filter" onchange="renderSingleAssetOptions()">

        </select>
      </div>

    el.innerHTML = `<div class="form-row"><label class="flabel">Asset type</label>
      <select class="field" id="la-typeid" onchange="renderChecklistFields()">
        ${STATE.types.map(t=>`<option value="${t.id}">${escapeHtml(t.name)} (${assetsOfType(t.id).length} assets)</option>`).join('')}

    renderChecklistFields();

function renderSingleAssetOptions(){
  const filterEl = document.getElementById('la-type-filter');
  const filterType = filterEl ? filterEl.value : '';
  const assetSel = document.getElementById('la-asset');
  const pre = STATE.logPrefill;
  const currentVal = assetSel ? assetSel.value : null;
  const list = STATE.assets.filter(a => !filterType || a.typeId===filterType);
  assetSel.innerHTML = list.length
    ? list.map(a=>`<option value="${escapeHtml(a.assetNumber)}">${escapeHtml(a.assetNumber)} — ${escapeHtml(typeName(a.typeId))}</option>`).join('')
    : '<option value="">No assets of this type</option>';
  if(currentVal && list.some(a=>a.assetNumber===currentVal)){
    assetSel.value = currentVal;
  }else if(pre && pre.assetNumber && list.some(a=>a.assetNumber===pre.assetNumber)){
    assetSel.value = pre.assetNumber;
  }
  renderChecklistFields();
}
function renderChecklistFields(){
  const actionType = document.getElementById('la-type').value;
  const interventionEl = document.getElementById('la-intervention');
  const checklistEl = document.getElementById('la-checklist');
  interventionEl.style.display = actionType==='intervention' ? 'block' : 'none';
  if(actionType==='intervention'){ checklistEl.innerHTML=''; return; }
  const scope = document.getElementById('la-scope').value;
  let typeId;
  if(scope==='single'){
    const assetEl = document.getElementById('la-asset');
    const a = assetEl ? STATE.assets.find(x=>x.assetNumber===assetEl.value) : null;
    typeId = a ? a.typeId : null;
  }else{
    const typeEl = document.getElementById('la-typeid');
    typeId = typeEl ? typeEl.value : null;
  }
  const type = STATE.types.find(t=>t.id===typeId);
  const items = type ? (actionType==='check'?type.check:type.pm) : [];
  if(!items || !items.length){ checklistEl.innerHTML='<p style="color:var(--ink-soft);font-size:12.5px;margin:8px 0;">No checklist template for this type/action yet.</p>'; return; }
  checklistEl.innerHTML = `<label class="flabel" style="margin-top:10px;display:block;">Checklist</label><div class="card">${items.map((it,i)=>`
    <div class="checklist-item"><input type="checkbox" id="cl-${i}"><label for="cl-${i}">${escapeHtml(it)}</label></div>`).join('')}</div>`;
}
function submitLogAction(){
  const scope = document.getElementById('la-scope').value;
  const actionType = document.getElementById('la-type').value;
  let assetNumbers = []; let typeId = null;
  if(scope==='single'){
    const assetEl = document.getElementById('la-asset');
    if(!assetEl || !assetEl.value){ toast('Add an asset first'); return; }
    assetNumbers = [assetEl.value];
  }else{
    typeId = document.getElementById('la-typeid').value;
    assetNumbers = assetsOfType(typeId).map(a=>a.assetNumber);
    if(!assetNumbers.length){ toast('No assets of that type yet'); return; }
  }
  const notes = document.getElementById('la-notes').value.trim();
  const link = document.getElementById('la-link').value.trim();
  const fileInput = document.getElementById('la-file');

  const action = {
    id:uid(), type:actionType, scope, assetNumbers, typeId: scope==='bulk'?typeId:undefined,
    notes: notes||undefined, docLink: link||undefined,
    loggedBy: currentUserLabel(), timestamp:new Date().toISOString()
  };

  if(actionType!=='intervention'){
    const checklistNodes = document.querySelectorAll('[id^="cl-"]');
    if(checklistNodes.length){
      const type = STATE.types.find(t=>t.id === (scope==='single' ? STATE.assets.find(a=>a.assetNumber===assetNumbers[0]).typeId : typeId));
      const items = actionType==='check'?type.check:type.pm;
      action.checklist = items.map((it,i)=>({item:it, checked: document.getElementById('cl-'+i).checked}));
    }
  }else{
    action.description = document.getElementById('la-desc').value.trim();
    action.resultingStatus = document.getElementById('la-result-status').value;
    assetNumbers.forEach(num=>{
      const a = STATE.assets.find(a=>a.assetNumber===num);
      if(a) a.status = action.resultingStatus;
    });
    safeSet('assets', STATE.assets);
  }

  const finish = ()=>{
    STATE.actions.push(action);
    safeSet('actions', STATE.actions);
    toast('Action logged');
    if(assetNumbers.length===1){ viewAssetProfile(assetNumbers[0]); }
    else{ navigate(STATE.role==='vendor' ? 'scan' : 'assets'); }
  };

  if(fileInput && fileInput.files && fileInput.files[0]){
    const file = fileInput.files[0];
    if(file.size > 1.5*1024*1024){
      toast('File over 1.5MB — use the link field instead');
      return;
    }
    const reader = new FileReader();
    reader.onload = function(){
      const docKey = 'doc:'+action.id;
      safeSet(docKey, {filename:file.name, mime:file.type, data:reader.result});
      action.docRef = {key:docKey, filename:file.name, mime:file.type, size:file.size};
      finish();
    };
    reader.readAsDataURL(file);
  }else{
    finish();
  }
}
async function downloadDoc(actionId){
  const rec = await safeGet('doc:'+actionId);
  if(!rec){ toast('Document not found'); return; }
  const a = document.createElement('a');
  a.href = rec.data; a.download = rec.filename;
  document.body.appendChild(a); a.click(); a.remove();
}

        const sched = STATE.pmSchedules.find(s=>s.assetNumber===a.assetNumber);
        const info = pmStatusFor(a.assetNumber);
        const lastPM = lastActionOfType(a.assetNumber,'pm');
        return `<tr>
          <td style="font-family:var(--mono)">${escapeHtml(a.assetNumber)}</td>
          <td>${escapeHtml(typeName(a.typeId))}</td>
          <td>${STATE.role==='admin' ? `<input class="field" style="width:80px" type="number" value="${sched?sched.intervalDays:''}" onchange="setPMInterval('${escapeHtml(a.assetNumber)}',this.value)">` : (sched?sched.intervalDays:'—')}</td>
          <td>${lastPM?fmtDate(lastPM.timestamp):'—'}</td>
          <td>${info.nextDue?fmtDate(info.nextDue):(info.noBaseline?'no baseline yet':'—')}</td>
          <td>${info.overdue?'<span class="pill pill-failure">Overdue</span>':(sched&&sched.intervalDays?'<span class="pill pill-operational">On track</span>':'—')}</td>
          ${STATE.role==='admin'?`<td><button class="btn btn-sm" onclick="viewAssetProfile('${escapeHtml(a.assetNumber)}')">View</button></td>`:''}

      }).join('')}

    ${!critical.length ? '<div class="empty-state">No critical-priority assets yet.</div>' : ''}

function setPMInterval(assetNumber, days){
  let sched = STATE.pmSchedules.find(s=>s.assetNumber===assetNumber);
  if(!sched){ sched={assetNumber, intervalDays:null}; STATE.pmSchedules.push(sched); }
  sched.intervalDays = days ? Number(days) : null;
  safeSet('pm-schedules', STATE.pmSchedules);
  toast('Schedule updated');
}

}
function downloadAssetPDF(assetNumber){
  const a = STATE.assets.find(a=>a.assetNumber===assetNumber);
  if(!a || !window.jspdf){ toast('PDF library not ready'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 18;
  doc.setFontSize(16); doc.text('Asset Report', 14, y); y+=8;
  doc.setFontSize(11);
  doc.text('Asset Number: '+a.assetNumber, 14, y); y+=6;
  doc.text('Type: '+typeName(a.typeId), 14, y); y+=6;
  doc.text('Manufacturer ID: '+(a.assetId||'—'), 14, y); y+=6;
  doc.text('Purchase date: '+fmtDate(a.purchaseDate), 14, y); y+=6;
  doc.text('Price: '+(a.price||'—'), 14, y); y+=6;
  doc.text('Priority: '+PRIORITY_DEF[a.priority].label, 14, y); y+=6;
  doc.text('Status: '+STATUS_DEF[a.status].label, 14, y); y+=10;
  doc.setFontSize(13); doc.text('History', 14, y); y+=8;
  doc.setFontSize(10);
  const history = actionsForAsset(assetNumber);
  if(!history.length){ doc.text('No actions logged.', 14, y); }
  history.forEach(h=>{
    if(y>270){ doc.addPage(); y=18; }
    doc.text(`${fmtDateTime(h.timestamp)} — ${ACTION_LABEL[h.type]}${h.resultingStatus?(' -> '+STATUS_DEF[h.resultingStatus].label):''}`, 14, y); y+=5;
    if(h.description){ doc.text('  '+h.description, 14, y); y+=5; }
    if(h.notes){ doc.text('  '+h.notes, 14, y); y+=5; }
    if(h.docRef){ doc.text('  Document: '+h.docRef.filename, 14, y); y+=5; }
    if(h.docLink){ doc.text('  Link: '+h.docLink, 14, y); y+=5; }
    y+=3;
  });
  doc.save('asset-report-'+assetNumber+'.pdf');
}
function qrDataUrl(text, size){
  if(typeof QRCode==='undefined') return null;
  const div = document.createElement('div');
  div.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
  document.body.appendChild(div);
  new QRCode(div, {text:text, width:size||200, height:size||200});
  const canvas = div.querySelector('canvas');
  const dataUrl = canvas ? canvas.toDataURL('image/png') : null;
  document.body.removeChild(div);
  return dataUrl;
}
function printLabel(assetNumber){
  if(typeof window.jspdf==='undefined'){ toast('PDF library failed to load — check your connection and reload'); return; }
  const a = getAsset(assetNumber);
  const dataUrl = qrDataUrl('ASSET:'+assetNumber, 300);
  if(!dataUrl){ toast('QR library failed to load — check your connection and reload'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:[70,80]});
  doc.addImage(dataUrl, 'PNG', 15, 8, 40, 40);
  doc.setFontSize(12);
  doc.text(assetNumber, 35, 55, {align:'center'});
  doc.setFontSize(8);
  doc.text(typeName(a.typeId), 35, 61, {align:'center'});
  doc.save('label-'+assetNumber+'.pdf');
  toast('Label downloaded — open the PDF to print or share it');
}
function downloadLabelSheet(list){
  if(!list.length){ toast('No assets to include'); return; }
  if(typeof window.jspdf==='undefined' || typeof QRCode==='undefined'){ toast('Required libraries failed to load — check your connection and reload'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  const cols=3, rows=4, cellW=60, cellH=65, marginX=15, marginY=15;
  const perPage = cols*rows;
  list.forEach((a, idx)=>{
    const posInPage = idx % perPage;
    if(idx>0 && posInPage===0) doc.addPage();
    const col = posInPage % cols, row = Math.floor(posInPage/cols);
    const x = marginX + col*cellW, y = marginY + row*cellH;
    const dataUrl = qrDataUrl('ASSET:'+a.assetNumber, 200);
    if(dataUrl) doc.addImage(dataUrl, 'PNG', x+10, y, 40, 40);
    doc.setFontSize(10);
    doc.text(a.assetNumber, x+30, y+46, {align:'center'});
    doc.setFontSize(7);
    doc.text(typeName(a.typeId), x+30, y+51, {align:'center'});
  });
  doc.save('asset-qr-labels.pdf');
  toast(list.length+' label(s) in one PDF — print on sticker sheets or paper and cut out');
}

/* ============================= SETTINGS ============================= */
function renderSettings(){
  return `
    <h3 style="margin-bottom:12px;">Asset types & checklists</h3>
    ${STATE.types.map(t=>`
      <div class="card" style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <strong>${escapeHtml(t.name)}</strong>
          <span style="font-size:12px;color:var(--ink-soft)">${assetsOfType(t.id).length} assets</span>
        </div>
        <div class="form-grid">
          <div>
            <label class="flabel">Check checklist</label>
            ${t.check.map((it,i)=>`<div class="checklist-item"><span style="flex:1">${escapeHtml(it)}</span><button class="btn btn-sm" onclick="removeChecklistItem('${t.id}','check',${i})">✕</button></div>`).join('')}
            <div style="display:flex;gap:6px;margin-top:6px;"><input class="field" id="new-check-${t.id}" placeholder="Add item…"><button class="btn btn-sm" onclick="addChecklistItem('${t.id}','check')">Add</button></div>
          </div>
          <div>
            <label class="flabel">Preventive maintenance checklist</label>
            ${t.pm.map((it,i)=>`<div class="checklist-item"><span style="flex:1">${escapeHtml(it)}</span><button class="btn btn-sm" onclick="removeChecklistItem('${t.id}','pm',${i})">✕</button></div>`).join('')}
            <div style="display:flex;gap:6px;margin-top:6px;"><input class="field" id="new-pm-${t.id}" placeholder="Add item…"><button class="btn btn-sm" onclick="addChecklistItem('${t.id}','pm')">Add</button></div>
          </div>
        </div>
      </div>
    `).join('')}
    <div class="card">
      <label class="flabel">Add a new asset type</label>
      <div style="display:flex;gap:8px;">
        <input class="field" id="new-type-name" placeholder="Type name">
        <button class="btn btn-primary" onclick="addAssetType()">Add type</button>
      </div>
    </div>
  `;
}
function addChecklistItem(typeId, kind){
  const input = document.getElementById('new-'+kind+'-'+typeId);
  const val = input.value.trim();
  if(!val) return;
  const t = STATE.types.find(t=>t.id===typeId);
  t[kind].push(val);
  safeSet('asset-types', STATE.types);
  render();
}
function removeChecklistItem(typeId, kind, idx){
  const t = STATE.types.find(t=>t.id===typeId);
  t[kind].splice(idx,1);
  safeSet('asset-types', STATE.types);
  render();
}
function addAssetType(){
  const name = document.getElementById('new-type-name').value.trim();
  if(!name){ toast('Enter a name'); return; }
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')+'-'+uid().slice(0,4);
  STATE.types.push({id, name, check:[], pm:[]});
  safeSet('asset-types', STATE.types);
  toast('Type added'); render();
}

/* ============================= IMPORT / EXPORT ============================= */
function openImportModal(){
  openModal('Import assets from Excel','Upload a file using the template columns: Asset Number, Asset ID, Type of Asset, Purchase Date, Price, Priority.', `
    <input type="file" class="field" id="import-file" accept=".xlsx,.xls,.csv">
    <div id="import-summary" style="margin-top:12px;font-size:12.5px;"></div>
  `, `<button class="btn" onclick="closeModal()">Close</button><button class="btn btn-primary" onclick="runImport()">Import</button>`);
}
function runImport(){
  if(typeof XLSX==='undefined'){ toast('Excel library failed to load — check your connection and reload'); return; }
  const fileInput = document.getElementById('import-file');
  if(!fileInput.files[0]){ toast('Choose a file'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
    const sheetName = wb.SheetNames.find(n=>n.toLowerCase().includes('import')) || wb.SheetNames[0];
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:''});
    let added=0, updated=0; const skipped=[];
    rows.forEach((row, idx)=>{
      const num = String(row['Asset Number']||'').trim();
      const typeName_ = String(row['Type of Asset']||'').trim();
      if(!num){ skipped.push('Row '+(idx+2)+': missing Asset Number'); return; }
      const type = STATE.types.find(t=>t.name.toLowerCase()===typeName_.toLowerCase());
      if(!type){ skipped.push('Row '+(idx+2)+': unknown type "'+typeName_+'"'); return; }
      let priority = String(row['Priority']||'').toLowerCase().trim();
      if(!['low','medium','critical'].includes(priority)) priority='medium';
      let purchaseDate = row['Purchase Date'];
      if(purchaseDate instanceof Date) purchaseDate = purchaseDate.toISOString().slice(0,10);
      else if(purchaseDate) purchaseDate = String(purchaseDate);
      const price = row['Price'] ? parseFloat(row['Price']) : undefined;
      const assetId = String(row['Asset ID']||'').trim();
      const existing = STATE.assets.find(a=>a.assetNumber===num);
      if(existing){
        existing.assetId=assetId||existing.assetId; existing.typeId=type.id; existing.purchaseDate=purchaseDate||existing.purchaseDate; existing.price=price!==undefined?price:existing.price; existing.priority=priority;
        updated++;
      }else{
        STATE.assets.push({assetNumber:num, assetId, typeId:type.id, purchaseDate, price, priority, status:'operational', createdAt:new Date().toISOString()});
        added++;
      }
    });
    safeSet('assets', STATE.assets);
    document.getElementById('import-summary').innerHTML = `Added ${added}, updated ${updated}, skipped ${skipped.length}.` + (skipped.length?'<br>'+skipped.join('<br>'):'');
    toast('Import complete');
  };
  reader.readAsArrayBuffer(fileInput.files[0]);
}
function exportExcel(){
  if(typeof XLSX==='undefined'){ toast('Excel library failed to load — check your connection and reload'); return; }
  const rows = STATE.assets.map(a=>({
    'Asset Number':a.assetNumber, 'Asset ID':a.assetId||'', 'Type of Asset':typeName(a.typeId),
    'Purchase Date':a.purchaseDate||'', 'Price':a.price||'', 'Priority':PRIORITY_DEF[a.priority].label, 'Status':STATUS_DEF[a.status].label
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Assets');
  XLSX.writeFile(wb, 'assets-export.xlsx');
}

/* ============================= MODAL ============================= */
function openModal(title, sub, bodyHtml, footerHtml){
  const backdrop = document.createElement('div');
  backdrop.className='modal-backdrop'; backdrop.id='modal-backdrop';
  backdrop.innerHTML = `<div class="modal">
    <h3>${title}</h3>
    ${sub?`<div class="sub">${sub}</div>`:''}
    <div>${bodyHtml}</div>
    <div class="modal-actions">${footerHtml}</div>
  </div>`;
  backdrop.addEventListener('click', function(e){ if(e.target===backdrop) closeModal(); });
  document.body.appendChild(backdrop);
}
function closeModal(){
  const el = document.getElementById('modal-backdrop');
  if(el) el.remove();
}

    <div class="visitor-shell">

function attachVisitorEvents(){}
function visitorScan(){
  let val = document.getElementById('v-scan-input').value.trim().replace(/^ASSET:/i,'');
  const a = STATE.assets.find(x=>x.assetNumber.toLowerCase()===val.toLowerCase());
  const el = document.getElementById('v-result');
  if(!a){ el.innerHTML = `<div class="empty-state">No asset found.</div>`; return; }
  const st = STATUS_DEF[a.status];
  const last = actionsForAsset(a.assetNumber)[0];
  el.innerHTML = `
    <div class="card">
      <div style="font-family:var(--mono);font-weight:600;font-size:16px;">${escapeHtml(a.assetNumber)}</div>
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;">${escapeHtml(typeName(a.typeId))}</div>
      <span class="pill pill-${a.status}">${st.label}</span>
      <div style="font-size:12px;color:var(--ink-soft);margin-top:10px;">
        ${last ? 'Last '+ACTION_LABEL[last.type].toLowerCase()+' on '+fmtDate(last.timestamp) : 'No recorded activity yet.'}
      </div>
    </div>
  `;
}
