<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cluj Facility — Asset Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#1C2530;
    --navy-2:#243040; 
    --paper:#F6F4EF; 
    --paper-2:#FFFFFF;
    --ink:#20262C; 
    --ink-soft:#5B6570; 
    --ink-faint:#8B8F94;
    --line:#DEDACF; 
    --line-strong:#C7C2B5;
    --amber:#C97F1E; 
    --amber-bg:#FBEEDA; 
    --amber-line:#E8C286;
    --steel:#33536C; 
    --steel-bg:#E8EEF2;
    --green:#3F7A55; 
    --green-bg:#E4F0E7; 
    --green-line:#B7D6C1;
    --red:#AE4636; 
    --red-bg:#F7E4E0; 
    --red-line:#E3B4A8;
    --gray:#75797D;
    --gray-bg:#ECEAE5;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --radius:8px;
  }
  *{
    box-sizing: border-box;
    margin:0; padding:0;
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  body{
    background: var(--paper);
    color: var(--ink);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  /* Sidebar */
  .sidebar{
    width: 240px;
    background: var(--navy);
    color: #FFF;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    border-right: 1px solid var(--navy-2);
  }
  .brand-area{
    padding: 24px 20px;
    border-bottom: 1px solid var(--navy-2);
  }
  .brand-sub{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--amber);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .brand-title{
    font-size: 18px;
    font-weight: 700;
    color: #FFF;
  }
  .nav-list{
    list-style: none;
    padding: 16px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .nav-item{
    padding: 10px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: #A0AEC0;
    transition: all 0.15s ease;
  }
  .nav-item:hover{
    background: rgba(255,255,255,0.04);
    color: #FFF;
  }
  .nav-item.active{
    background: var(--navy-2);
    color: #FFF;
    border-left: 4px solid var(--amber);
    padding-left: 16px;
  }
  .nav-icon{
    font-family: var(--mono);
    font-size: 12px;
    font-weight: bold;
    color: var(--ink-faint);
    width: 20px;
  }
  .nav-item.active .nav-icon{
    color: var(--amber);
  }
  
  /* Main Workspace */
  .main-content{
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    background: var(--paper);
    min-width: 0;
  }
  .top-bar{
    height: 64px;
    background: var(--paper-2);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
  }
  .view-title{
    font-size: 18px;
    font-weight: 700;
  }
  .role-selector{
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .role-select{
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--line-strong);
    background: var(--paper-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  
  .view-container{
    padding: 32px;
    overflow-y: auto;
    flex-grow: 1;
  }
  
  /* Utility Components */
  .card{
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
  }
  .stats-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }
  .stat-card{
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
  }
  .stat-val{
    font-size: 32px;
    font-weight: 700;
    font-family: var(--mono);
    margin-bottom: 4px;
  }
  .stat-lbl{
    font-size: 13px;
    color: var(--ink-soft);
  }
  
  /* Buttons & Forms */
  .btn{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s ease;
    gap: 8px;
  }
  .btn-primary{
    background: var(--navy);
    color: #FFF;
  }
  .btn-primary:hover{ background: var(--navy-2); }
  .btn-secondary{
    background: var(--paper-2);
    border-color: var(--line-strong);
    color: var(--ink);
  }
  .btn-secondary:hover{ background: var(--paper); }
  .btn-danger{
    background: var(--red-bg);
    color: var(--red);
    border-color: var(--red-line);
  }
  .btn-danger:hover{ background: #F2D6CE; }
  
  .form-group{
    margin-bottom: 16px;
  }
  .form-label{
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .form-input, .form-select, .form-textarea{
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--line-strong);
    background: var(--paper-2);
    font-size: 14px;
    color: var(--ink);
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus{
    outline: none;
    border-color: var(--navy);
  }
  
  /* Status Pills */
  .pill{
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .pill-operational{ background: var(--green-bg); color: var(--green); }
  .pill-intervention{ background: var(--amber-bg); color: var(--amber); }
  .pill-failure{ background: var(--red-bg); color: var(--red); }
  .pill-pm-due{ background: var(--steel-bg); color: var(--steel); }
  
  /* Lists & Tables */
  .data-table{
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 13.5px;
  }
  .data-table th{
    background: var(--paper);
    padding: 12px 16px;
    font-weight: 600;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--line-strong);
  }
  .data-table td{
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-2);
  }
  .data-table tr:hover td{
    background: rgba(0,0,0,0.01);
  }
  
  /* Layout Panels */
  .split-panel{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  @media(max-width: 900px){
    .split-panel { grid-template-columns: 1fr; }
  }
  
  /* Checkbox Custom lists */
  .check-item{
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type="checkbox"]{
    margin-top: 3px;
    width: 15px;
    height: 15px;
    cursor: pointer;
  }
  .check-label{
    font-size: 13.5px;
    line-height: 1.4;
    cursor: pointer;
  }
  
  .empty-state{
    padding: 40px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
    border: 2px dashed var(--line-strong);
    border-radius: var(--radius);
  }
  
  /* Print Sheet CSS overrides */
  .print-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
  }
  .label-box {
    border: 1px dashed #aaa;
    padding: 12px;
    background: #fff;
    text-align: center;
    border-radius: 4px;
  }
  .qr-holder {
    display: flex;
    justify-content: center;
    margin: 8px 0;
  }
  .qr-holder canvas, .qr-holder img {
    max-width: 110px;
    max-height: 110px;
  }
</style>
</head>
<body>

<div class="sidebar" id="sidebar-nav">
  <div class="brand-area">
    <div class="brand-sub">CLUJ FACILITY</div>
    <div class="brand-title">Asset Manager</div>
  </div>
  <ul class="nav-list" id="menu-items"></ul>
</div>

<div class="main-content">
  <div class="top-bar">
    <div class="view-title" id="current-view-title">Dashboard</div>
    <div class="role-selector">
      <span>Viewing as</span>
      <select class="role-select" id="role-switch" onchange="changeRole(this.value)">
        <option value="Admin">Admin</option>
        <option value="Team user">Team user</option>
        <option value="Vendor / handyman">Vendor / handyman</option>
        <option value="Visitor">Visitor (public scan)</option>
      </select>
    </div>
  </div>
  
  <div class="view-container" id="workspace"></div>
</div>

<script>
/* ============================= CONFIGURATION HUB ============================= */
const SUPABASE_URL = "https://jngpintjesnybpgzidbw.supabase.co";
const SUPABASE_KEY = "sb_publishable_DTKA8kKFUwrGJZjCoSMfYA_H8WnMX2s";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ============================= SYSTEM CONSTANTS & CONFIGS ============================= */
const ROLES = ['Admin', 'Team user', 'Vendor / handyman', 'Visitor'];
const ASSET_TYPES = [
  { id: 'hvac', name: 'HVAC Unit' },
  { id: 'electrical', name: 'Electrical Panel' },
  { id: 'plumbing', name: 'Plumbing Booster' },
  { id: 'fire-safety', name: 'Fire Extinguisher / Hydrant' },
  { id: 'access-control', name: 'Turnstile / Automated Gate' }
];

const STATUS_DEF = {
  'operational': { label: 'Operational', class: 'operational' },
  'intervention': { label: 'Requires intervention', class: 'intervention' },
  'failure': { label: 'Failure', class: 'failure' },
  'pm-due': { label: 'Overdue PM (critical)', class: 'pm-due' }
};

const ACTION_LABEL = {
  'check': 'Check / Routine Patrol',
  'pm': 'Preventive Maintenance',
  'intervention': 'Breakdown Intervention'
};

const CHECKLISTS = {
  'hvac': {
    'check': ['Verify operation status & controllers', 'Inspect external condenser for clutter', 'Listen for anomalous vibrations / compressor cycles'],
    'pm': ['Clean/replace air handling filters', 'Check coolant pressures & pipeline leaks', 'Secure electrical terminals & draw current reads', 'Sanitize condensate drain pathways'],
    'intervention': ['Recover circuit faults / reset controllers', 'Swap worn fan drives or contactors', 'Log component diagnostic codes']
  },
  'electrical': {
    'check': ['Visual validation of closure tags & warning signs', 'Confirm pilot indicator system state', 'Ensure free physical perimeter around enclosure'],
    'pm': ['Thermal tracking scan for contact hotspots', 'Torque compliance load on critical breakers', 'Vacuum structural particulate / dust layers', 'Verify secondary grounding bonding continuity'],
    'intervention': ['Isolate failed sub-circuits completely', 'Replace non-compliant shorted breakers', 'Emergency failover testing sequence']
  },
  'plumbing': {
    'check': ['Pressure gauge assessment against standard setpoints', 'Inspect structural manifold for active weeping', 'Acoustic verification of pump multi-staging cycle'],
    'pm': ['Expansion vessel pre-charge adjustment', 'Lubrication metrics on pump bearing housings', 'Calibrate cut-in / cut-out pressure transducers'],
    'intervention': ['Re-prime air-locked booster loops', 'Mechanical seal replacement module deployment', 'Control relay module swap']
  },
  'fire-safety': {
    'check': ['Pressure needle check within safe green boundary', 'Verify tamper containment seals are intact', 'Confirm unblocked path to safety station'],
    'pm': ['Weight monitoring matching factory specification', 'Nozzle / discharge hose structure integrity test', 'Hydrostatic certification data confirmation'],
    'intervention': ['Immediate matching unit replacement deployment', 'Re-charging deployment workflow log', 'Valve housing rebuild assembly']
  },
  'access-control': {
    'check': ['Validate reader response with reference card', 'Visual assessment of mechanical alignment closing state', 'Obstruction detection photocell trigger test'],
    'pm': ['Lubricate drive linkage hinges & internal gearboxes', 'Backup battery load drop-down tests', 'Clean optical path sensor lenses', 'Firmware integrity confirmation cycle'],
    'intervention': ['Emergency override physical release activation test', 'Solenoid assembly mechanical replacement', 'Controller network interface card reset']
  }
};

/* ============================= SYSTEM STATE ============================= */
let STATE = {
  role: 'Admin',
  route: 'dashboard',
  assets: [],
  actions: [],
  selectedAsset: null
};

/* ============================= INITIALIZATION ============================= */
window.addEventListener('DOMContentLoaded', async () => {
  await syncWithDatabase();
  initView();
});

async function syncWithDatabase() {
  try {
    const { data: dbAssets, error: assetErr } = await supabaseClient.from('assets').select('*');
    if (assetErr) throw assetErr;
    
    const { data: dbActions, error: actionErr } = await supabaseClient.from('action_logs').select('*');
    if (actionErr) throw actionErr;

    STATE.assets = dbAssets || [];
    STATE.actions = dbActions || [];
  } catch (err) {
    console.error("Database sync failed.", err);
    STATE.assets = [];
    STATE.actions = [];
  }
}

function initView(){
  buildSidebarMenu();
  renderCurrentView();
}

/* ============================= PERSISTENCE ROUTINES ============================= */
async function pushAssetToDatabase(asset) {
  try {
    const { error } = await supabaseClient.from('assets').upsert(asset);
    if (error) throw error;
  } catch (e) {
    console.error("Error updating asset profile layer:", e);
  }
}

async function pushActionToDatabase(action) {
  try {
    const { error } = await supabaseClient.from('action_logs').insert(action);
    if (error) throw error;
  } catch (e) {
    console.error("Error pushing historical field action:", e);
  }
}

/* ============================= BUSINESS ENGINE LOGIC ============================= */
function actionsForAsset(num){
  return STATE.actions
    .filter(x => x.assetNumber.toLowerCase() === num.toLowerCase())
    .sort((a,b) => b.timestamp - a.timestamp);
}

function calculateMetrics(){
  let counts = { total: STATE.assets.length, operational:0, intervention:0, failure:0, pmDue:0 };
  STATE.assets.forEach(a => {
    if(a.status === 'operational') counts.operational++;
    if(a.status === 'intervention') counts.intervention++;
    if(a.status === 'failure') counts.failure++;
    if(a.status === 'pm-due') counts.pmDue++;
  });
  return counts;
}

/* ============================= NAVIGATION & SIDEBAR UI ============================= */
const MENU_CONFIG = [
  { id: 'dashboard', lbl: 'Dashboard', icon: 'DB', roles: ['Admin', 'Team user', 'Vendor / handyman'] },
  { id: 'assets', lbl: 'Assets', icon: 'AS', roles: ['Admin', 'Team user'] },
  { id: 'log-action', lbl: 'Log action', icon: 'LA', roles: ['Admin', 'Team user', 'Vendor / handyman'] },
  { id: 'scan-lookup', lbl: 'Scan / lookup', icon: 'SC', roles: ['Admin', 'Team user', 'Vendor / handyman'] },
  { id: 'pm-schedule', lbl: 'PM schedule', icon: 'PM', roles: ['Admin', 'Team user'] },
  { id: 'reports', lbl: 'Reports', icon: 'RP', roles: ['Admin'] },
  { id: 'settings', lbl: 'Settings', icon: 'ST', roles: ['Admin'] }
];

function buildSidebarMenu(){
  const container = document.getElementById('menu-items');
  container.innerHTML = '';
  
  if(STATE.role === 'Visitor'){
    document.getElementById('sidebar-nav').style.display = 'none';
    return;
  } else {
    document.getElementById('sidebar-nav').style.display = 'flex';
  }
  
  MENU_CONFIG.forEach(item => {
    if(item.roles.includes(STATE.role)){
      const li = document.createElement('li');
      li.className = `nav-item ${STATE.route === item.id ? 'active' : ''}`;
      li.onclick = () => navigateTo(item.id);
      li.innerHTML = `<span class="nav-icon">${item.icon}</span> <span>${item.lbl}</span>`;
      container.appendChild(li);
    }
  });
}

function navigateTo(route, params = null){
  STATE.route = route;
  if(params) {
    if(params.assetNumber) STATE.selectedAsset = params.assetNumber;
  }
  buildSidebarMenu();
  renderCurrentView();
}

function changeRole(val){
  STATE.role = val;
  if(!MENU_CONFIG.find(x => x.id === STATE.route).roles.includes(val)){
    STATE.route = (val === 'Visitor') ? 'visitor-scan' : 'dashboard';
  }
  if(val === 'Visitor') STATE.route = 'visitor-scan';
  buildSidebarMenu();
  renderCurrentView();
}

/* ============================= RENDER HUB ============================= */
function renderCurrentView(){
  const ws = document.getElementById('workspace');
  const title = document.getElementById('current-view-title');
  ws.innerHTML = '';
  
  title.innerText = STATE.route.replace('-',' ').toUpperCase();
  
  switch(STATE.route){
    case 'dashboard': renderDashboard(ws); break;
    case 'assets': renderAssetsView(ws); break;
    case 'log-action': renderLogActionView(ws); break;
    case 'scan-lookup': renderScanLookupView(ws); break;
    case 'pm-schedule': renderPmScheduleView(ws); break;
    case 'reports': renderReportsView(ws); break;
    case 'settings': renderSettingsView(ws); break;
    case 'asset-profile': renderAssetProfileView(ws); break;
    case 'visitor-scan': renderVisitorScanView(ws); break;
    default: ws.innerHTML = `<div>View not found.</div>`;
  }
}

/* ============================= INTERFACE VIEWS ============================= */
function renderDashboard(el){
  const m = calculateMetrics();
  let recentRows = '';
  
  const slice = [...STATE.actions].sort((a,b)=>b.timestamp-a.timestamp).slice(0,5);
  slice.forEach(act => {
    recentRows += `
      <tr>
        <td style="font-family:var(--mono); font-weight:600;">${escapeHtml(act.assetNumber)}</td>
        <td>${escapeHtml(ACTION_LABEL[act.type])}</td>
        <td>${escapeHtml(act.operator)}</td>
        <td>${fmtDate(act.timestamp)}</td>
        <td><span class="pill pill-${act.resultingStatus}">${STATUS_DEF[act.resultingStatus].label}</span></td>
      </tr>
    `;
  });

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" style="color:var(--navy);">${m.total}</div><div class="stat-lbl">Total assets</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green);">${m.operational}</div><div class="stat-lbl">Operational</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--amber);">${m.intervention}</div><div class="stat-lbl">Requires intervention</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--red);">${m.failure}</div><div class="stat-lbl">Failure</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--steel);">${m.pmDue}</div><div class="stat-lbl">Overdue PM (critical)</div></div>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom:16px;">Recent activity</h3>
      ${slice.length === 0 ? '<div class="empty-state">No actions logged yet.</div>' : `
        <table class="data-table">
          <thead>
            <tr><th>Asset</th><th>Action Type</th><th>Operator</th><th>Timestamp</th><th>Result Status</th></tr>
          </thead>
          <tbody>${recentRows}</tbody>
        </table>
      `}
    </div>
  `;
}

function renderAssetsView(el){
  let rows = '';
  STATE.assets.forEach(a => {
    rows += `
      <tr style="cursor:pointer;" onclick="navigateTo('asset-profile', {assetNumber: '${a.assetNumber}'})">
        <td style="font-family:var(--mono); font-weight:600;">${escapeHtml(a.assetNumber)}</td>
        <td>${escapeHtml(a.name)}</td>
        <td>${escapeHtml(typeName(a.typeId))}</td>
        <td>${escapeHtml(a.location)}</td>
        <td><span class="pill pill-${a.status}">${STATUS_DEF[a.status].label}</span></td>
      </tr>
    `;
  });

  el.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <h2 style="font-size:16px; font-weight:600;">All Monitored Assets</h2>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-secondary" onclick="exportToExcel()">Export Excel</button>
        <button class="btn btn-primary" onclick="openNewAssetModal()">+ Register Asset</button>
      </div>
    </div>
    
    <div class="card" style="padding:0; overflow:hidden;">
      ${STATE.assets.length === 0 ? '<div style="padding:24px;"><div class="empty-state">No assets registered yet. Click Register Asset to start.</div></div>' : `
        <table class="data-table">
          <thead>
            <tr><th>Asset #</th><th>Description Name</th><th>Type Category</th><th>Location</th><th>Current Status</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `}
    </div>
  `;
}

function openNewAssetModal(){
  const ws = document.getElementById('workspace');
  let opts = '';
  ASSET_TYPES.forEach(t => opts += `<option value="${t.id}">${t.name}</option>`);
  
  const div = document.createElement('div');
  div.style = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:1000;';
  div.id = 'asset-modal';
  div.innerHTML = `
    <div class="card" style="width:450px; margin:0; background:#FFF;">
      <h3 style="margin-bottom:16px;">Register New Facility Asset</h3>
      <div class="form-group">
        <label class="form-label">Asset Identifier (Unique Number)</label>
        <input type="text" id="m-num" class="form-input" placeholder="e.g. HVAC-04-CLUJ" style="text-transform:uppercase;">
      </div>
      <div class="form-group">
        <label class="form-label">Asset Name / Description</label>
        <input type="text" id="m-name" class="form-input" placeholder="e.g. Daikin Chiller Enclosure B">
      </div>
      <div class="form-group">
        <label class="form-label">Category System Type</label>
        <select id="m-type" class="form-select">${opts}</select>
      </div>
      <div class="form-group">
        <label class="form-label">Facility Location Floor/Room</label>
        <input type="text" id="m-loc" class="form-input" placeholder="e.g. Roof Level, Section West">
      </div>
      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:24px;">
        <button class="btn btn-secondary" onclick="document.getElementById('asset-modal').remove()">Cancel</button>

async function submitActionLog(){
  let num = document.getElementById('l-asset').value;
  let type = document.getElementById('l-type').value;
  let user = document.getElementById('l-user').value.trim();
  let resStatus = document.getElementById('l-status').value;
  let notes = document.getElementById('l-notes').value.trim();
  
  if(!num || !user){
    alert('Asset target and operational identity parameters cannot be blank.');
    return;
  }
  
  let a = STATE.assets.find(x => x.assetNumber === num);
  let list = CHECKLISTS[a.typeId][type] || [];
  let checklistResults = [];
  
  for(let i=0; i<list.length; i++){
    let chk = document.getElementById(`chk-${i}`);
    checklistResults.push({
      text: list[i],
      checked: chk ? chk.checked : false
    });
  }
  
  let actionItem = {
    id: crypto.randomUUID ? crypto.randomUUID() : 'act-' + Date.now(),
    assetNumber: num,
    type: type,
    operator: user,
    resultingStatus: resStatus,
    notes: notes,
    timestamp: Date.now(),
    checklist: checklistResults
  };
  
  STATE.actions.push(actionItem);
  await pushActionToDatabase(actionItem);
  
  a.status = resStatus;
  if(type === 'pm' && resStatus === 'operational'){
    a.nextPmDate = Date.now() + (90 * 24 * 60 * 60 * 1000);
  }
  await pushAssetToDatabase(a);
  
  alert('Technical operations file successfully executed & pushed to cloud storage.');
  navigateTo('dashboard');
}

/* ============================= SYSTEM STRUCTURAL UTILITIES ============================= */
function typeName(id){
  let obj = ASSET_TYPES.find(x => x.id === id);
  return obj ? obj.name : 'Unknown Device System';
}

function fmtDate(ms){
  if(!ms) return 'N/A';
  let d = new Date(ms);
  let day = String(d.getDate()).padStart(2,'0');
  let m = String(d.getMonth()+1).padStart(2,'0');
  return `${day}.${m}.${d.getFullYear()}`;
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function exportToExcel(){
  if(STATE.assets.length === 0) { alert('No assets structure elements available to export.'); return; }
  let rows = STATE.assets.map(a => ({
    'Asset Number': a.assetNumber,
    'Name/Description': a.name,
    'System Category': typeName(a.typeId),
    'Facility Location': a.location,
    'Current Status': STATUS_DEF[a.status].label,
    'Next PM Target Date': fmtDate(a.nextPmDate)
  }));
  let ws = XLSX.utils.json_to_sheet(rows);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Facility Assets Data");
  XLSX.writeFile(wb, "Cluj_Facility_Assets_Matrix.xlsx");
}

function printSingleLabel(num){

function triggerPrintLabelSheet(){
  if(STATE.assets.length === 0) { alert('No operational records to display on label arrays.'); return; }
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  let idx = 0;
  
  function processNext(){
    if(idx >= STATE.assets.length){
      doc.save("Facility_Industrial_Labels_Matrix.pdf");
      return;
    }
    let a = STATE.assets[idx];
    let d = document.createElement('div');
    d.style.position = 'fixed';
    d.style.left = '-9999px';
    document.body.appendChild(d);
    new QRCode(d, { text: 'ASSET:' + a.assetNumber, width: 100, height: 100 });
    
    setTimeout(() => {
      let img = d.querySelector('img');
      let src = img ? img.src : d.querySelector('canvas').toDataURL();
      
      let row = Math.floor((idx % 24) / 4);
      let col = idx % 4;
      let x = 15 + (col * 45);
      let y = 15 + (row * 42);
      
      doc.rect(x, y, 40, 38);
      doc.setFont("courier", "bold"); doc.setFontSize(8);
      doc.text("CLUJ FACILITY", x+3, y+6);
      doc.setFont("helvetica", "normal"); doc.setFontSize(7);
      doc.text("ID: " + a.assetNumber, x+3, y+12);
      doc.addImage(src, 'PNG', x+7, y+14, 22, 22);
      
      d.remove();
      idx++;
      if(idx % 24 === 0 && idx < STATE.assets.length) doc.addPage();
      processNext();
    }, 100);
  }
  processNext();
}

async function wipeLocalSystemMemory(){
  if(confirm('Are you absolutely certain you want to purge your entire system database context?')){
    try {
      const { error: err1 } = await supabaseClient.from('assets').delete().neq('assetNumber', '');
      const { error: err2 } = await supabaseClient.from('action_logs').delete().neq('id', '');
      if (err1 || err2) throw (err1 || err2);
      alert('Cloud backend memory successfully purged.');
      location.reload();
    } catch (e) {
      alert('Purge operation failed: ' + e.message);
    }
  }
}
